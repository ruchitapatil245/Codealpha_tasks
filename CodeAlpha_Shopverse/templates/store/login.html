{% extends 'store/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <h1>Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your ShopVerse account</p>

        <form method="post" class="auth-form">
            {% csrf_token %}
            {% if form.non_field_errors %}
            <div class="alert alert-error">{{ form.non_field_errors.0 }}</div>
            {% endif %}

            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" class="form-input" required autofocus>
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" class="form-input" required>
            </div>

            <button type="submit" class="btn btn-primary btn-lg btn-block">Sign In</button>
        </form>

        <p class="auth-footer">Don't have an account? <a href="{% url 'store:register' %}">Create one</a></p>
    </div>
</section>
{% endblock %}
